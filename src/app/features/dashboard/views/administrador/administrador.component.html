<!-- Sección de Ventas -->
<section class="kpis">
  <app-card [title]="labelVentaAcum" [value]="totales?.ventaAcum ?? 0"></app-card>
  <app-card [title]="labelCuota" [value]="totales?.cuotaMes ?? 0"></app-card>
  <app-card title="Cumplimiento" [value]="totales?.porcCump ?? 0"></app-card>
  <app-card title="Proyección" [value]="totales?.proyeccionVenta ?? 0"></app-card>
</section>

<section class="charts">
  <app-ventas
    [codigoVendedor]="codigoVendedorAnalisis"
    [filtros]="filtrosAnalisis"
    [tipoCuota]="tipoCuota"
    [modoAdmin]="true"
  >
  </app-ventas>
</section>

@if (modalAsignarVisible) {
  <div class="modal-overlay" (click)="cerrarModalAsignar()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Asignar supervisor</h3>
        <button class="btn-close" type="button" (click)="cerrarModalAsignar()" aria-label="Cerrar modal">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>

      <div class="modal-body">
        <p>
          Vendedor: <strong>{{ vendedorEnModal?.nombre || '—' }}</strong>
          <span *ngIf="vendedorEnModal?.codVendedor">({{ vendedorEnModal?.codVendedor }})</span>
        </p>

        <label for="supervisorSelect">Supervisor</label>
        <select id="supervisorSelect" class="form-select" [(ngModel)]="supervisorSeleccionado">
          <option value="">Selecciona un supervisor</option>
          <option *ngFor="let supervisor of supervisoresList" [value]="supervisor.id_usuario ?? supervisor.idUsuario ?? supervisor.id">
            {{ supervisor.username || supervisor.nombre || 'Supervisor' }}
          </option>
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn-cancelar" type="button" (click)="cerrarModalAsignar()">Cancelar</button>
        <button
          class="btn-guardar"
          type="button"
          [disabled]="asignandoSupervisor || !supervisorSeleccionado"
          (click)="asignarSupervisor()"
        >
          <span *ngIf="asignandoSupervisor" class="spinner" aria-hidden="true"></span>
          {{ asignandoSupervisor ? 'Asignando...' : 'Asignar supervisor' }}
        </button>
      </div>
    </div>
  </div>
}
