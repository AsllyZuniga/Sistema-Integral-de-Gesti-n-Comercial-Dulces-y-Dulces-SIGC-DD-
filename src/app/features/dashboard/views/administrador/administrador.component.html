<!-- Sección de Ventas -->
<section class="kpis">
  <app-card [title]="labelVentaAcum" [value]="totales?.ventaAcum ?? 0"></app-card>
  <app-card [title]="labelCuota" [value]="totales?.cuotaMes ?? 0"></app-card>
  <app-card title="Cumplimiento" [value]="totales?.porcCump ?? 0"></app-card>
  <app-card title="Proyección" [value]="totales?.proyeccionVenta ?? 0"></app-card>
</section>

<section class="charts">
  <div class="chart-box dynamic-panel">
    <h3>
      Lista de vendedores
      <span class="tipo-badge">{{ labelCuota }}</span>
    </h3>

    <app-vendedores-table
      [esAdmin]="true"
      [labelCuota]="labelCuota"
      [labelVentaAcum]="labelVentaAcum"
      [campoCuota]="campoCuota"
      [cargandoVendedores]="cargandoVendedores"
      [todosLosVendedores]="todosLosVendedores"
      (asignarSupervisor)="abrirModalAsignar($event)"
    ></app-vendedores-table>
  </div>
</section>

<section class="charts">
  <app-ventas
    [codigoVendedor]="codigoVendedorAnalisis"
    [filtros]="filtrosActivos"
    [tipoCuota]="tipoCuota"
    [modoAdmin]="true"
  >
  </app-ventas>
</section>

@if (modalAsignarVisible && vendedorEnModal) {
  <div class="modal-overlay" (click)="cerrarModalAsignar()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Asignar Supervisor</h3>
        <button class="btn-close" (click)="cerrarModalAsignar()">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>

      <div class="modal-body">
        <p><strong>Vendedor:</strong> {{ vendedorEnModal.nombre }}</p>
        <p>
          <strong>Código:</strong>
          {{ vendedorEnModal.codigo_vendedor ?? vendedorEnModal.codVendedor ?? '—' }}
        </p>

        <label for="supervisorSelect">Seleccionar Supervisor:</label>
        <select id="supervisorSelect" [(ngModel)]="supervisorSeleccionado" class="form-select">
          <option value="">-- Sin Supervisor --</option>
          @for (
            supervisor of supervisoresList;
            track supervisor.id_usuario ?? supervisor.idUsuario ?? supervisor.id
          ) {
            <option [value]="supervisor.id_usuario ?? supervisor.idUsuario ?? supervisor.id">
              {{ supervisor.username ?? supervisor.nombre ?? supervisor.nombre }}
            </option>
          }
        </select>
      </div>

      <div class="modal-footer">
        <button
          class="btn-cancelar"
          (click)="cerrarModalAsignar()"
          [disabled]="asignandoSupervisor"
        >
          Cancelar
        </button>
        <button class="btn-guardar" (click)="asignarSupervisor()" [disabled]="asignandoSupervisor">
          @if (asignandoSupervisor) {
            <span class="spinner"></span>
            Asignando...
          } @else {
            Guardar
          }
        </button>
      </div>
    </div>
  </div>
}
