<section class="kpis">
  <app-card [title]="labelVentaAcum" [value]="ventaMesVista ?? totales?.ventaAcum ?? 0"></app-card>
  <app-card
    [title]="labelCuota"
    [value]="
      cuotaVista ??
      (tipoCuota === 'diaria'
        ? (totales?.cuotaDia ?? totales?.cuotaMes ?? 0)
        : tipoCuota === 'semanal'
          ? (totales?.cuotaSemana ?? totales?.cuotaMes ?? 0)
          : (totales?.cuotaMes ?? 0))
    "
  ></app-card>
  <app-card title="Cumplimiento" [value]="porcCumpVista ?? totales?.porcCump ?? 0"></app-card>
  <app-card title="Proyección" [value]="proyeccionVista ?? totales?.proyeccionVenta ?? 0"></app-card>
</section>

<section class="charts">
  <app-ventas
    [codigoVendedor]="codigoVendedorAnalisis"
    [filtros]="filtrosAnalisis"
    [tipoCuota]="tipoCuota"
    [modoAdmin]="true"
    (resumenCambio)="onResumenCambio($event)"
  ></app-ventas>
</section>

@if (modalAsignarVisible) {
  <div class="modal-overlay" (click)="cerrarModalAsignar()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Asignar supervisor</h3>
        <button
          class="btn-close"
          type="button"
          (click)="cerrarModalAsignar()"
          aria-label="Cerrar modal"
        >
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>

      <div class="modal-body">
        <p>
          Vendedor: <strong>{{ vendedorEnModal?.nombre || '—' }}</strong>
          @if (vendedorEnModal?.codVendedor) {
            <span>({{ vendedorEnModal?.codVendedor }})</span>
          }
        </p>

        <label for="supervisorSelect">Supervisor</label>
        <select id="supervisorSelect" class="form-select" [(ngModel)]="supervisorSeleccionado">
          <option value="">Selecciona un supervisor</option>
          @for (
            supervisor of supervisoresList;
            track supervisor.id_usuario ?? supervisor.idUsuario ?? supervisor.id
          ) {
            <option [value]="supervisor.id_usuario ?? supervisor.idUsuario ?? supervisor.id">
              {{ supervisor.username || supervisor.nombre || 'Supervisor' }}
            </option>
          }
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn-cancelar" type="button" (click)="cerrarModalAsignar()">Cancelar</button>
        <button
          class="btn-guardar"
          type="button"
          [disabled]="asignandoSupervisor || !supervisorSeleccionado"
          (click)="asignarSupervisor()"
        >
          @if (asignandoSupervisor) {
            <span class="spinner" aria-hidden="true"></span>
          }
          {{ asignandoSupervisor ? 'Asignando...' : 'Asignar supervisor' }}
        </button>
      </div>
    </div>
  </div>
}
