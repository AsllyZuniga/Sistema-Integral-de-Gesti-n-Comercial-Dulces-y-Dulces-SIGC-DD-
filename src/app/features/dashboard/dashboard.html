<div class="layout" [class.mobile-open]="isMobileMenuOpen">
  <div class="mobile-overlay" *ngIf="isMobileMenuOpen" (click)="isMobileMenuOpen = false"></div>

  <app-sidebar (toggle)="onToggleSidebar($event)"></app-sidebar>

  <div class="main" [class.expanded]="isSidebarCollapsed">

    <header class="topbar">
      <div class="title-container">
        <button class="mobile-menu-btn" (click)="isMobileMenuOpen = !isMobileMenuOpen">☰</button>
        <img class="topbar-logo" src="logoDulces.png" alt="Logo" />
        <div class="topbar-divider"></div>
        <div class="topbar-text">
          <h1>Dashboard Vendedor</h1>
          <span class="welcome" *ngIf="vendedor">Bienvenido, {{ vendedor.nombre }}</span>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="user-badge" *ngIf="vendedor">
          <span class="user-avatar">{{ vendedor.nombre?.charAt(0) }}</span>
          <span class="user-name">{{ vendedor.nombre }}</span>
        </div>
        <button class="logout-btn" (click)="logout()">
          <span class="material-symbols-rounded">logout</span>
          <span class="logout-label">Cerrar sesión</span>
        </button>
      </div>
    </header>

    <section class="filters">
      <app-filters
        [vendedores]="vendedoresList"
        [proveedores]="proveedoresList"
        [categorias]="categoriasList"
        [ciudades]="ciudadesList"
        (apply)="onAplicarFiltros($event)">
      </app-filters>
    </section>

    <section class="kpis">
      <app-card title="Total Venta Mes" [value]="totales?.ventaAcum      ?? 0"></app-card>
      <app-card title="Total Cuota"     [value]="totales?.cuotaMes        ?? 0"></app-card>
      <app-card title="Cumplimiento"    [value]="totales?.porcCump        ?? 0"></app-card>
      <app-card title="Proyección"      [value]="totales?.proyeccionVenta ?? 0"></app-card>
    </section>

    <section class="charts">
      <app-ventas [codigoVendedor]="codigoVendedor" [filtros]="filtrosActivos"></app-ventas>
    </section>

    <section class="charts">
      <app-impactos [codigoVendedor]="codigoVendedor" [filtros]="filtrosActivos"></app-impactos>
    </section>

    <section class="charts">
      <app-devoluciones [codigoVendedor]="codigoVendedor" [filtros]="filtrosActivos"></app-devoluciones>
    </section>

  </div>
</div>
