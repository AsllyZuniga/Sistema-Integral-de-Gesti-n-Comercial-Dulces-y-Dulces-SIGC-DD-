<div class="layout">
  <app-sidebar (toggle)="onToggleSidebar($event)"></app-sidebar>

  <div class="main" [class.expanded]="isSidebarCollapsed">
    <app-topbar
      textoIntro="Bienvenido,"
      [titulo]="vendedor?.nombre || 'Dashboard'"
      subtitulo="Sistema de Control de Ventas · Dulces y Dulces"
      (menuClick)="toggleMenuMovil()"
      (logoutClick)="logout()"
    ></app-topbar>

    <div class="cuota-selector-row">
      <app-cuotas-cumplimiento
        [tipoCuota]="tipoCuota"
        (tipoCuotaChange)="onCambiarTipoCuota($event)"
      ></app-cuotas-cumplimiento>
    </div>

    <section class="filters">
      <app-filters
        [proveedores]="proveedoresList"
        [categorias]="categoriasList"
        [ciudades]="ciudadesList"
        [lineas]="lineasList"
        [vendedores]="esAdmin || esSupervisor ? vendedoresList : []"
        [mostrarFiltroVendedor]="esAdmin || esSupervisor"
        (apply)="onAplicarFiltros($event)"
        (vendedorChange)="onVendedorChange($event)"
        (proveedorChange)="onProveedorChange($event)"
      ></app-filters>
    </section>

    @if (esAdmin) {
      <app-administrador-dashboard
        [tipoCuota]="tipoCuota"
        [filtrosActivos]="filtrosActivos"
      ></app-administrador-dashboard>
    }

    @if (esSupervisor) {
      <app-supervisor-dashboard
        [tipoCuota]="tipoCuota"
        [vista]="activeSupervisorView"
        [filtrosActivos]="filtrosActivos"
      ></app-supervisor-dashboard>
    }

    @if (rolId === 3) {
      <section class="kpis">
        <app-card [title]="labelVentaAcum" [value]="totalesVendedor?.ventaAcum ?? 0"></app-card>
        <app-card
          [title]="labelCuota"
          [value]="
            tipoCuota === 'diaria'
              ? (totalesVendedor?.cuotaDiaria ?? totalesVendedor?.cuotaMes ?? 0)
              : tipoCuota === 'semanal'
                ? (totalesVendedor?.cuotaSemana ?? totalesVendedor?.cuotaMes ?? 0)
                : (totalesVendedor?.cuotaMes ?? 0)
          "
        ></app-card>
        <app-card title="Cumplimiento" [value]="totalesVendedor?.porcCump ?? 0"></app-card>
        <app-card title="Proyección" [value]="totalesVendedor?.proyeccionVenta ?? 0"></app-card>
      </section>

      <section class="charts">
        @if (activeAnalisisView === 'impactos') {
          <app-impactos></app-impactos>
        } @else {
          <app-ventas
            [codigoVendedor]="codigoVendedor"
            [modoAdmin]="false"
            [filtros]="filtrosActivos"
            [tipoCuota]="tipoCuota"
          ></app-ventas>
        }
      </section>
    }
  </div>
</div>
