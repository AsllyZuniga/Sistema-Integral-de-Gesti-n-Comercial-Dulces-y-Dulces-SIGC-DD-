<div class="layout" [class.mobile-open]="isMobileMenuOpen">

  <div class="mobile-overlay" *ngIf="isMobileMenuOpen" (click)="isMobileMenuOpen = false"></div>

  <app-sidebar (toggle)="onToggleSidebar($event)"></app-sidebar>

  <div class="main" [class.expanded]="isSidebarCollapsed">

    <header class="topbar">
      <div class="title-container">
        <button class="mobile-menu-btn" (click)="isMobileMenuOpen = !isMobileMenuOpen">☰</button>
        <div>
          <h1>Dashboard Vendedor</h1>
          <span class="welcome" *ngIf="vendedor">
            Bienvenido, {{ vendedor.nombre }}
          </span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
    </header>

    <section class="filters">
      <app-filters></app-filters>
    </section>

    <section class="kpis">
      <app-card title="Total Venta Mes" [value]="totales?.ventaAcum ?? 0"></app-card>
      <app-card title="Total Cuota" [value]="totales?.cuotaMes ?? 0"></app-card>
      <app-card title="Cumplimiento" [value]="totales?.porcCump ?? 0"></app-card>
      <app-card title="Proyección" [value]="totales?.proyeccionVenta ?? 0"></app-card>
    </section>

    <section class="charts">
      <div class="chart-box dynamic-panel">

        <h3>Análisis de Ventas</h3>

        <div class="tabs">
          <button *ngFor="let view of ventasViews"
            [class.active]="activeVentasView === view.key"
            (click)="setVentasView(view.key)">
            {{ view.label }}
          </button>
        </div>

        <div class="dynamic-content" [ngSwitch]="activeVentasView">

          <!-- VENTAS -->
          <div *ngSwitchCase="'ventas'" class="grafica-container">
            <app-chart
              *ngIf="chartData.length > 0; else noData"
              [data]="chartData"
              type="line">
            </app-chart>
          </div>

          <!-- PROVEEDOR -->
          <div *ngSwitchCase="'proveedor'" class="proveedor-layout">

            <div class="tabla-scroll">
              <app-table
                *ngIf="tableData.length > 0; else noData"
                [columns]="lineasColumns"
                [data]="tableData">
              </app-table>
            </div>

            <div class="grafica-proveedor">
              <app-chart
                *ngIf="chartData.length > 0; else noData"
                [data]="chartData"
                type="bar">
              </app-chart>
            </div>

          </div>

          <!-- CIUDAD -->
          <div *ngSwitchCase="'ciudad'" class="proveedor-layout">

            <div class="tabla-scroll">
              <app-table
                *ngIf="tableData.length > 0; else noData"
                [columns]="ciudadesColumns"
                [data]="tableData">
              </app-table>
            </div>

            <div class="grafica-proveedor">
              <app-chart
                *ngIf="chartData.length > 0; else noData"
                [data]="chartData"
                type="pie">
              </app-chart>
            </div>

          </div>

          <!-- VENDEDOR -->
          <div *ngSwitchCase="'vendedor'" class="tabla-vendedor">
            <div class="tabla-scroll">
              <app-table
                *ngIf="tableData.length > 0; else noData"
                [columns]="tableColumns"
                [data]="tableData">
              </app-table>
            </div>
          </div>

          <!-- DETALLE POR ITEM (NUEVO) -->
          <div *ngSwitchCase="'item'" class="proveedor-layout">

            <div class="tabla-scroll">
              <app-table
                *ngIf="tableData.length > 0; else noData"
                [columns]="productosColumns"
                [data]="tableData">
              </app-table>
            </div>

            <div class="grafica-proveedor">
              <app-chart
                *ngIf="chartData.length > 0; else noData"
                [data]="chartData"
                type="bar">
              </app-chart>
            </div>

          </div>

        </div>
      </div>
    </section>

  </div>
</div>

<ng-template #noData>
  <div class="placeholder" style="padding: 2rem; text-align:center;">
    Cargando información...
  </div>
</ng-template>
