<div class="layout">
  <app-sidebar (toggle)="onToggleSidebar($event)"></app-sidebar>

  <div class="main" [class.expanded]="isSidebarCollapsed">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleMenuMovil()">
          <span class="material-symbols-rounded">menu</span>
        </button>
        <img class="topbar-logo" src="logoDulces.png" alt="Logo" />
      </div>
      <div class="topbar-center">
        <h1>
          <span class="accent">Bienvenido,</span>
          {{ vendedor?.nombre || 'Dashboard' }}
        </h1>
        <span class="welcome">Sistema de Control de Ventas · Dulces y Dulces</span>
      </div>
      <div class="topbar-right">
        <button class="logout-btn" (click)="logout()">
          <span class="material-symbols-rounded">logout</span>
          <span class="logout-label">Salir</span>
        </button>
      </div>
    </header>

    <!-- Selector de tipo de cuota -->
    <div class="cuota-selector-row">
      <app-cuotas-cumplimiento
        [(tipoCuota)]="tipoCuota"
        (tipoCuotaChange)="onCambiarTipoCuota($event)"
      >
      </app-cuotas-cumplimiento>
    </div>

    <!-- Filtros -->
    <section class="filters">
      <app-filters
        [proveedores]="proveedoresList"
        [categorias]="categoriasList"
        [ciudades]="ciudadesList"
        [lineas]="lineasList"
        [vendedores]="esAdmin ? vendedoresList : []"
        (apply)="onAplicarFiltros($event)"
      >
      </app-filters>
    </section>

    @if (esAdmin) {
      <app-administrador-dashboard
        [tipoCuota]="tipoCuota"
        [filtrosActivos]="filtrosActivos"
      ></app-administrador-dashboard>
    }

    @if (esSupervisor) {
      <app-supervisor-dashboard
        [tipoCuota]="tipoCuota"
        [filtrosActivos]="filtrosActivos"
      ></app-supervisor-dashboard>
    }

    <!-- VENDEDOR: gráficas y detalle — recibe tipoCuota para usar el servicio correcto -->
    @if (rolId === 3) {
      <!-- KPIs vendedor -->
      <section class="kpis">
        <app-card [title]="labelVentaAcum" [value]="totalesVendedor?.ventaAcum ?? 0"> </app-card>
        <app-card [title]="labelCuota" [value]="totalesVendedor?.cuotaMes ?? 0"> </app-card>
        <app-card title="Cumplimiento" [value]="totalesVendedor?.porcCump ?? 0"> </app-card>
        <app-card title="Proyección" [value]="totalesVendedor?.proyeccionVenta ?? 0"> </app-card>
      </section>

      <section class="charts">
        <app-ventas
          [codigoVendedor]="codigoVendedor"
          [filtros]="filtrosActivos"
          [tipoCuota]="tipoCuota"
        >
        </app-ventas>
      </section>
    }
  </div>
</div>
