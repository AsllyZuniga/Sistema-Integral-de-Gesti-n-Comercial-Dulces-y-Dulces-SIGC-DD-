<div class="login-container">
  <div class="login-wrapper">
    <div class="login-header">
      <img src="/logoDulces.png" alt="Logo Dulces y Dulces" class="logo-img" />
      <h1 class="app-title">Sistema de Control de Ventas</h1>
      <p class="app-subtitle">Ingrese su código para acceder</p>
    </div>

    <div class="login-card">
      <h2 class="form-title">Iniciar Sesión</h2>

      <div class="alert alert-error" *ngIf="is_error">
        <span>{{ errorMessage }}</span>
      </div>

      <div class="form-group">
        <label for="codigo">Código del Vendedor</label>
        <input
          id="codigo"
          [(ngModel)]="user.codigo"
          [ngModelOptions]="{ updateOn: 'change' }"
          type="text"
          class="form-input"
          placeholder="Ingrese su código"
          (input)="onCredentialInput()"
          (keyup.enter)="validarUsuario()"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-field">
          <input
            id="password"
            [(ngModel)]="user.password"
            [ngModelOptions]="{ updateOn: 'change' }"
            [type]="mostrarPassword ? 'text' : 'password'"
            class="form-input"
            placeholder="Ingrese su contraseña"
            (input)="onCredentialInput()"
            (keyup.enter)="validarUsuario()"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            [attr.title]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <span class="material-symbols-rounded">
              {{ mostrarPassword ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <button type="button" class="btn-login" (click)="validarUsuario()" [disabled]="is_loading">
        {{ is_loading ? 'Verificando...' : 'Iniciar Sesión' }}
      </button>
    </div>
  </div>
</div>
