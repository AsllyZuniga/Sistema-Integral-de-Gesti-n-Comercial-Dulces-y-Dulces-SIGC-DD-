<main class="login-shell">
  <section class="login-stage" aria-label="Inicio de sesión de Dulces y Dulces">
    <aside class="login-brand-panel">
      <div class="brand-overlay"></div>

      <div class="brand-top">
        <img
          ngSrc="/logoDulces.png"
          width="260"
          height="110"
          priority
          alt="Dulces y Dulces"
          class="brand-logo"
        />

        <div class="brand-content">
          <h1>Bienvenido</h1>
          <p>Distribuidora Comercial Dulces y Dulces</p>
        </div>
      </div>
    </aside>

    <section class="login-form-panel">
      <div class="login-form-head">
        <div>
          <h2>Iniciar sesión</h2>
          <p>Ingrese su código, nombre o nombre de usuario para acceder.</p>
        </div>
      </div>

      <div class="alert alert-error" *ngIf="is_error">
        <span>{{ errorMessage }}</span>
      </div>

      <form class="login-form" (ngSubmit)="validarUsuario()">
        <div class="form-group">
          <label for="codigo">Código, nombre o usuario</label>
          <input
            id="codigo"
            name="codigo"
            [(ngModel)]="user.codigo"
            [ngModelOptions]="{ updateOn: 'change' }"
            type="text"
            class="form-input"
            placeholder="Ingrese su código, nombre o usuario"
            maxlength="60"
            minlength="3"
            autocomplete="username"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            (input)="onCredentialInput()"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-field">
            <input
              id="password"
              name="password"
              [(ngModel)]="user.password"
              [ngModelOptions]="{ updateOn: 'change' }"
              [type]="mostrarPassword ? 'text' : 'password'"
              class="form-input"
              placeholder="Ingrese su contraseña"
              minlength="4"
              maxlength="128"
              autocomplete="current-password"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              (input)="onCredentialInput()"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              [attr.title]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <span class="material-symbols-rounded">
                {{ mostrarPassword ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="btn-login"
          [disabled]="is_loading"
          [attr.aria-label]="is_loading ? 'Verificando credenciales' : 'Iniciar sesión'"
        >
          {{ is_loading ? 'Verificando...' : 'Iniciar sesión' }}
        </button>
      </form>
    </section>
  </section>
</main>
