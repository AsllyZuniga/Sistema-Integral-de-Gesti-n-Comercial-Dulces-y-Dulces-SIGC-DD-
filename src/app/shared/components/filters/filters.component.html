<div class="filters-container">
  <button class="btn-toggle-filtros" (click)="toggleFiltros()">
    {{ isFiltrosOpen ? 'Ocultar Filtros ❌' : 'Mostrar Filtros ⚙️' }}
  </button>

  <div class="filters-grid" [class.oculto-movil]="!isFiltrosOpen">
    <div class="filter-group date-filter-group">
      <label>Rango de Fechas</label>
      <div class="date-range">
        <input type="date" [(ngModel)]="filtros.fechaInicio" />
        <input type="date" [(ngModel)]="filtros.fechaFin" />
      </div>
    </div>

    <div class="filter-group">
      <label>Vendedores</label>
      <select [(ngModel)]="filtros.vendedor">
        <option value="">Todos</option>
        <option *ngFor="let v of vendedores" [value]="v">
          {{ v }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label>Proveedor</label>
      <select [(ngModel)]="filtros.proveedor">
        <option value="">Todos</option>
        <option *ngFor="let p of proveedores" [value]="p">
          {{ p }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label>Categoría</label>
      <select [(ngModel)]="filtros.categoria">
        <option value="">Todas</option>
        <option *ngFor="let c of categorias" [value]="c">
          {{ c }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label>Ciudad</label>
      <select [(ngModel)]="filtros.ciudad">
        <option value="">Todas</option>
        <option *ngFor="let ci of ciudades" [value]="ci">
          {{ ci }}
        </option>
      </select>
    </div>

    <div class="filter-button">
      <button class="apply-btn" (click)="aplicar()">Aplicar Filtros</button>
    </div>
  </div>
</div>
