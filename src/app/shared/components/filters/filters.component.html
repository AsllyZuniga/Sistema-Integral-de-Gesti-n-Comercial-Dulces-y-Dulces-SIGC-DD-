<div class="filters-container">
  <button class="btn-toggle" (click)="toggleFiltros()">
    <span class="material-symbols-rounded">tune</span>
    {{ isFiltrosOpen ? 'Ocultar Filtros' : 'Mostrar Filtros' }}
    <span class="material-symbols-rounded toggle-arrow">expand_more</span>
  </button>

  <div class="filters-grid" [class.hidden-mobile]="!isFiltrosOpen">

    <div class="filter-group span-2">
      <label>Rango de Fechas</label>
      <div class="date-range">
        <input type="date" [(ngModel)]="filtros.fechaInicio" />
        <span class="sep">—</span>
        <input type="date" [(ngModel)]="filtros.fechaFin" />
      </div>
    </div>

    @if (esAdmin) {
      <div class="filter-group">
        <label>Vendedor</label>
        <select [(ngModel)]="filtros.vendedor">
          <option value="">Todos</option>
          @for (v of vendedores; track v.value) {
            <option [value]="v.value">{{ v.label }}</option>
          }
        </select>
      </div>
    }

    <div class="filter-group">
      <label>Proveedor</label>
      <select [(ngModel)]="filtros.proveedor">
        <option value="">Todos</option>
        @for (p of proveedores; track p.value) {
          <option [value]="p.value">{{ p.label }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label>Categoría</label>
      <select [(ngModel)]="filtros.categoria">
        <option value="">Todas</option>
        @for (c of categorias; track c.value) {
          <option [value]="c.value">{{ c.label }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label>Ciudad</label>
      <select [(ngModel)]="filtros.ciudad">
        <option value="">Todas</option>
        @for (ci of ciudades; track ci.value) {
          <option [value]="ci.value">{{ ci.label }}</option>
        }
      </select>
    </div>

    <div class="filter-actions">
      <button class="btn-limpiar" (click)="limpiar()">Limpiar</button>
      <button class="btn-aplicar" (click)="aplicar()">Aplicar Filtros</button>
    </div>
  </div>
</div>
