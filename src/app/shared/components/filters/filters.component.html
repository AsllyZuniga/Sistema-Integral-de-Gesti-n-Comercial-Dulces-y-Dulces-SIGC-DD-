<div class="filters-container">
  <button type="button" class="btn-toggle" (click)="toggleFiltros()">
    <span class="material-symbols-rounded">tune</span>
    {{ isFiltrosOpen ? 'Ocultar Filtros' : 'Mostrar Filtros' }}
    <span class="material-symbols-rounded toggle-arrow">expand_more</span>
  </button>

  <div class="filters-grid" [class.hidden-mobile]="!isFiltrosOpen">
    <div class="filter-group span-2">
      <label>Rango de Fechas</label>
      <div class="date-range">
        <input
          type="date"
          [(ngModel)]="filtros.fechaInicio"
          (focus)="onClickOtroFiltro()"
          (click)="onClickOtroFiltro()"
        />
        <span class="sep">—</span>
        <input
          type="date"
          [(ngModel)]="filtros.fechaFin"
          (focus)="onClickOtroFiltro()"
          (click)="onClickOtroFiltro()"
        />
      </div>
    </div>

    @if (mostrarFiltroVendedor) {
      <div class="filter-group">
        <label>Vendedor</label>
        <select
          [(ngModel)]="filtros.vendedor"
          (ngModelChange)="onVendedorChange($event)"
          (focus)="onClickOtroFiltro()"
          (click)="onClickOtroFiltro()"
        >
          <option value="">Todos</option>
          @for (v of vendedores; track v.value) {
            <option [value]="v.value">{{ v.label }}</option>
          }
        </select>
      </div>
    }

    <div class="filter-group">
      <label>Proveedor</label>
      <select
        [(ngModel)]="filtros.proveedor"
        (ngModelChange)="onProveedorChange($event)"
        (focus)="onClickOtroFiltro()"
        (click)="onClickOtroFiltro()"
      >
        <option value="">Todos</option>
        @for (p of proveedores; track p.value) {
          <option [value]="p.value">{{ p.label }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label>Categoría</label>

      <div class="checkbox-dropdown">
        <button
          type="button"
          class="checkbox-dropdown-toggle"
          (click)="toggleCategoriaDropdown()"
        >
          <span class="checkbox-dropdown-text">
            {{ textoCategoriasSeleccionadas }}
          </span>

          <span class="material-symbols-rounded dropdown-icon">expand_more</span>
        </button>

        @if (mostrarCategoriaDropdown) {
          <div class="checkbox-dropdown-menu">
            <label class="checkbox-item checkbox-item-all">
              <input
                type="checkbox"
                [checked]="categoriasSeleccionadas.length === 0"
                (change)="limpiarCategoriasSeleccionadas()"
              />
              <span>Todas</span>
            </label>

            @for (c of categorias; track c.value) {
              <label class="checkbox-item">
                <input
                  type="checkbox"
                  [value]="c.value"
                  [checked]="filtros.categorias?.includes(c.value) || false"
                  (change)="toggleCategoriaCheckbox(c.value)"
                />
                <span>{{ c.label }}</span>
              </label>
            }
          </div>
        }
      </div>
    </div>

    <div class="filter-group">
      <label>Ciudad</label>
      <select
        [(ngModel)]="filtros.ciudad"
        (focus)="onClickOtroFiltro()"
        (click)="onClickOtroFiltro()"
      >
        <option value="">Todas</option>
        @for (ci of ciudadesVista; track ci.value) {
          <option [value]="ci.value">{{ ci.label }}</option>
        }
      </select>
    </div>

    <div class="filter-actions">
      <button type="button" class="btn-limpiar" (click)="limpiar()">Limpiar</button>
      <button type="button" class="btn-aplicar" (click)="aplicar()">Aplicar Filtros</button>
    </div>
  </div>
</div>
