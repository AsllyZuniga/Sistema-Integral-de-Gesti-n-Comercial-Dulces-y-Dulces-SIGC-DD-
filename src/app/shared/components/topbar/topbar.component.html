<header class="topbar" [class.compact]="compacto">
  <div class="topbar-left">
    <button class="mobile-menu-btn" type="button" (click)="menuClick.emit()" aria-label="Abrir menú">
      <span class="material-symbols-rounded">menu</span>
    </button>
    <img class="topbar-logo" src="logoDulces.png" alt="Logo" />
  </div>

  <div class="topbar-center">
    <h1 class="topbar-title" [title]="textoIntro ? textoIntro + ' ' + titulo : titulo">
      <span class="topbar-title-text">
        @if (textoIntro) {
          <span class="accent">{{ textoIntro }}</span>
          {{ titulo }}
        } @else {
          <span class="accent">{{ titulo }}</span>
        }
      </span>
    </h1>
    <span class="welcome">{{ subtitulo }}</span>
    @if (nombreUsuario) {
      <span class="topbar-user">{{ nombreUsuario }}</span>
    }
  </div>

  @if (mostrarCerrarSesion) {
    <div class="topbar-right">
      <button class="logout-btn" type="button" (click)="logoutClick.emit()">
        <span class="material-symbols-rounded">logout</span>
        <span class="logout-label">Salir</span>
      </button>
    </div>
  }
</header>
