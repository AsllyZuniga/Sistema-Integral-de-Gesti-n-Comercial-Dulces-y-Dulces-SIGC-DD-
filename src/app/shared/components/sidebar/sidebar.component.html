<aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <div class="top">
    <span class="logo-text">{{ tituloRol }}</span>
    <button class="btn-toggle-desktop" (click)="toggleSidebar()" title="Colapsar menú">☰</button>
  </div>

  <nav>
    @if (esVendedor) {
      <div class="nav-group-title">Ventas</div>

      <a
        [routerLink]="['/dashboard']"
        [queryParams]="{ vista: 'ventas' }"
        [class.active]="isVendedorVistaActive('ventas')"
        [attr.data-tooltip]="isCollapsed ? 'Análisis de ventas' : null">
        <span class="icon material-symbols-rounded">analytics</span>
        <span class="label">Análisis de ventas</span>
      </a>

      <!-- Análisis de Impactos removido para vendedores según solicitud -->
    }

    @if (esAdmin) {
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.ruta"
          [class.active]="isActive(item.ruta)"
          [attr.data-tooltip]="isCollapsed ? item.label : null">
          <span class="icon material-symbols-rounded">{{ item.icon }}</span>
          <span class="label">{{ item.label }}</span>
        </a>
      }
    }

    @if (esSupervisor) {
      <a
        [routerLink]="['/dashboard']"
        [queryParams]="{ seccion: 'asignados' }"
        [class.active]="isSupervisorVistaActive('asignados')"
        [attr.data-tooltip]="isCollapsed ? 'Vendedores asignados' : null">
        <span class="icon material-symbols-rounded">groups</span>
        <span class="label">Vendedores asignados</span>
      </a>

      <a
        [routerLink]="['/dashboard']"
        [queryParams]="{ seccion: 'analisis' }"
        [class.active]="isSupervisorVistaActive('analisis')"
        [attr.data-tooltip]="isCollapsed ? 'Análisis de ventas' : null">
        <span class="icon material-symbols-rounded">analytics</span>
        <span class="label">Análisis de ventas</span>
      </a>
    }
  </nav>
</aside>

<!-- Overlay móvil — cierra el sidebar al tocar fuera -->
@if (isMobileOpen) {
  <div class="mobile-overlay" (click)="closeMobile()"></div>
}
