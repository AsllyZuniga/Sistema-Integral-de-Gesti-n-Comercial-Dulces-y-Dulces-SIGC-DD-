<aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <div class="top">
    <span class="logo-text">{{ tituloRol }}</span>
    <button class="btn-toggle-desktop" (click)="toggleSidebar()" title="Colapsar menú">☰</button>
  </div>

  <nav>
    @for (item of navItems; track item.label) {
      <a
        [routerLink]="item.ruta"
        [queryParams]="item.queryParams || null"
        [class.active]="isActive(item)"
        [attr.data-tooltip]="isCollapsed ? item.label : null">
        <span class="icon material-symbols-rounded">{{ item.icon }}</span>
        <span class="label">{{ item.label }}</span>
      </a>
    }
  </nav>
</aside>

@if (isMobileOpen) {
  <div class="mobile-overlay" (click)="closeMobile()"></div>
}
